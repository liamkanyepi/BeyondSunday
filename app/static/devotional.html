<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Devotional Generator</title>
<style>
  :root { --nav-height: 64px; }

  body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #000;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .container {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding: 20px;
    gap: 16px;
    text-align: center;
    margin-bottom: var(--nav-height);
    overflow-y: auto;
  }

  input, select, textarea {
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #333;
    font-size: 1rem;
    width: 100%;
    max-width: 400px;
    background: rgba(255,255,255,0.1);
    color: #fff;
  }

  button {
    background: #fff;          /* white button */
    border: none;
    padding: 14px 22px;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    color: #000;              /* black text */
    transition: background 0.2s ease, transform 0.15s ease;
  }
  button:hover { 
    background: #f0f0f0;       /* subtle grey hover */
    transform: translateY(-2px);
  }

  input[type="file"] { display: none; }
  label.file-label {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.95rem;
    color: #fff;
  }
  label.file-label:hover { background: rgba(255,255,255,0.2); }

  #devotionalResult {
    margin-top: 20px;
    padding: 16px;
    border-radius: 12px;
    background: rgba(255,255,255,0.1);
    max-width: 600px;
    max-height: 50vh;
    overflow-y: auto;
    text-align: left;
    display: none;
    white-space: pre-line;
  }

  #devotionalResult::-webkit-scrollbar { width: 6px; }
  #devotionalResult::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
  }

  @media (min-width: 768px) {
    #devotionalResult { max-height: 65vh; }
  }

  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--nav-height);
    display: flex;
    justify-content: space-around;
    align-items: center;
    background: rgba(20,20,20,0.95);
    border-top: 1px solid #333;
    backdrop-filter: blur(6px);
  }
  .nav-item {
    width: 56px; height: 56px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    font-size: 28px;
    user-select: none;
  }
  .nav-item.active {
    outline: 2px solid rgba(255,255,255,0.15);
    outline-offset: 2px;
  }

  .cross-icon { width: 28px; height: 28px; display: block; }

  #loadingOverlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 200;
    color: white;
    font-size: 1.2rem;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid rgba(255,255,255,0.3);
    border-top: 4px solid white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Loading Overlay -->
<div id="loadingOverlay">
  <div class="spinner"></div>
  <p>Generating your devotional...</p>
</div>

<div class="container">
  <h2>Generate a Personal Devotional</h2>

  <input type="text" id="feelingInput" placeholder="How are you feeling today?" />
  <select id="topicInput">
    <option value="">Select a devotional topic...</option>
    <option value="faith">Faith</option>
    <option value="hope">Hope</option>
    <option value="love">Love</option>
    <option value="peace">Peace</option>
    <option value="strength">Strength</option>
    <option value="gratitude">Gratitude</option>
  </select>

  <input type="file" id="photoInput" accept="image/*" />
  <label for="photoInput" class="file-label">📷 Upload an optional photo</label>

  <button id="generateBtn">Generate Devotional</button>

  <div id="devotionalResult"></div>
</div>

<nav class="bottom-nav">
  <div class="nav-item" onclick="window.location='http://localhost:5000/'">🏠</div>
  <div class="nav-item" onclick="window.location='http://localhost:5000/upload'">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="cross-icon">
      <circle cx="50" cy="50" r="45" stroke="white" stroke-width="8" fill="none"/>
      <line x1="50" y1="25" x2="50" y2="75" stroke="white" stroke-width="8" stroke-linecap="round"/>
      <line x1="30" y1="50" x2="70" y2="50" stroke="white" stroke-width="8" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="nav-item" onclick="window.location='discover.html'">🌍</div>
  <div class="nav-item" onclick="window.location='profile.html'">👤</div>
  <div class="nav-item" onclick="window.location='http://localhost:5000/devotional'">📖</div>
</nav>

<script>
  const generateBtn = document.getElementById('generateBtn');
  const loadingOverlay = document.getElementById('loadingOverlay');
  const resultBox = document.getElementById('devotionalResult');

  generateBtn.addEventListener('click', async () => {
    const feeling = document.getElementById('feelingInput').value;
    const topic = document.getElementById('topicInput').value;
    const photoFile = document.getElementById('photoInput').files[0];

    if (!feeling || !topic) {
      alert("Please enter your feeling and select a topic.");
      return;
    }

    const formData = new FormData();
    formData.append('feeling', feeling);
    formData.append('topic', topic);
    if (photoFile) formData.append('photo', photoFile);

    loadingOverlay.style.display = 'flex';

    try {
      const response = await fetch('/generate_devotional', {
        method: 'POST',
        body: formData
      });
      const data = await response.json();

      if (data.error) {
        alert(data.error);
      } else {
        resultBox.textContent = data.devotional;
        resultBox.style.display = 'block';
      }
    } catch (err) {
      console.error(err);
      alert("Failed to generate devotional.");
    } finally {
      loadingOverlay.style.display = 'none';
    }
  });
</script>

</body>
</html>
