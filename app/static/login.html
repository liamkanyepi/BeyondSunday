<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeyondSunday - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">
  <div class="w-full max-w-sm px-6 py-8 bg-gray-800 rounded-2xl shadow-lg">
    <h1 class="text-center text-2xl font-bold mb-6">BeyondSunday</h1>

    <!-- Tabs -->
    <div class="flex mb-6 border-b border-gray-600">
      <button id="loginTab" class="flex-1 py-2 text-blue-500 border-b-2 border-blue-500">Login</button>
      <button id="signupTab" class="flex-1 py-2 text-gray-400 hover:text-blue-400">Sign Up</button>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="space-y-4">
      <input type="email" placeholder="Email" class="w-full px-4 py-3 rounded-lg bg-gray-700 text-white" />
      <input type="password" placeholder="Password" class="w-full px-4 py-3 rounded-lg bg-gray-700 text-white" />
      <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-lg">Login</button>
    </form>

    <!-- Sign Up Form -->
    <form id="signupForm" class="space-y-4 hidden">
      <input type="text" placeholder="Full Name" class="w-full px-4 py-3 rounded-lg bg-gray-700 text-white" />
      <input type="email" placeholder="Email" class="w-full px-4 py-3 rounded-lg bg-gray-700 text-white" />
      <input type="password" placeholder="Password" class="w-full px-4 py-3 rounded-lg bg-gray-700 text-white" />
      <button type="submit" class="w-full py-3 bg-green-600 hover:bg-green-700 rounded-lg">Create Account</button>
    </form>
  </div>

  <script>
    const loginTab = document.getElementById('loginTab');
    const signupTab = document.getElementById('signupTab');
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');

    loginTab.addEventListener('click', () => {
      loginForm.classList.remove('hidden');
      signupForm.classList.add('hidden');
      loginTab.classList.add('text-blue-500', 'border-b-2', 'border-blue-500');
      signupTab.classList.remove('text-blue-500', 'border-b-2', 'border-blue-500');
    });

    signupTab.addEventListener('click', () => {
      signupForm.classList.remove('hidden');
      loginForm.classList.add('hidden');
      signupTab.classList.add('text-blue-500', 'border-b-2', 'border-blue-500');
      loginTab.classList.remove('text-blue-500', 'border-b-2', 'border-blue-500');
    });

    // Redirect after login/sign-up
    document.querySelectorAll("form").forEach(form => {
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        window.location.href = "http://localhost:5000/upload"; // Your upload page
      });
    });
  </script>
</body>
</html>
