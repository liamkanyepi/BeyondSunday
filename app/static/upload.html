<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Beyond Sunday Story</title>
<style>
  :root { --nav-height: 64px; }

  body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #000;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Logo always visible top-left */
  .logo {
    position: fixed;
    top: 8px;
    left: 12px;
    z-index: 50;
  }
  .logo img {
    height: 40px;
    object-fit: contain;
  }

  .upload-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  button {
    background: linear-gradient(135deg, #ff5f6d, #ffc371);
    border: none;
    padding: 14px 22px;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    color: #000;
  }
  button:hover { filter: brightness(1.1); }

  input[type="file"] { display: none; }

  /* Story display */
  .story-container {
    position: relative;
    flex: 1;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }

  .story-image {
    flex: 1;
    object-fit: contain;
    width: 100%;
    height: calc(100vh - var(--nav-height));
    background-color: black;
    padding: 1px 20px;
    box-sizing: border-box;
  }

  /* Scripture overlay */
  .scripture-text {
    position: fixed;
    bottom: calc(var(--nav-height) + 100px);
    left: 50%;
    transform: translateX(-50%);
    max-width: 90%;
    background: rgba(0, 0, 0, 0.6);
    color: #fff;
    padding: 12px 18px;
    border-radius: 16px;
    font-size: 1.1rem;
    text-align: center;
    line-height: 1.4;
    backdrop-filter: blur(4px);
    opacity: 0;
    transition: opacity 0.8s ease;
    z-index: 20;
  }
  .scripture-text.show { opacity: 1; }

  /* Dropdown */
  #scriptureDropdownContainer {
    position: fixed;
    top: 56px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20,20,20,0.85);
    padding: 8px 12px;
    border-radius: 12px;
    z-index: 30;
    display: block; /* always visible, updated later */
  }
  #scriptureSelect {
    padding: 6px 10px;
    border-radius: 6px;
    border: none;
    font-size: 0.9rem;
  }

  /* Progress bar */
  .progress-bar {
    position: absolute;
    top: 0; left: 0;
    height: 4px;
    background: rgba(255,255,255,0.4);
    width: 100%;
  }
  .progress-fill {
    height: 100%;
    background: white;
    width: 0%;
    transition: width linear;
  }

  /* Emotions row */
  .emotion-row {
    position: absolute;
    bottom: calc(var(--nav-height) + 16px);
    left: 0; right: 0;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 0 12px;
    scrollbar-width: none;
  }
  .emotion-row::-webkit-scrollbar { display: none; }

  .emotion-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(6px);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 0.95rem;
    white-space: nowrap;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.2);
    transition: background 0.2s ease;
  }
  .emotion-chip.selected {
    background: rgba(255,255,255,0.8);
    color: #000;
  }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--nav-height);
    display: flex;
    justify-content: space-around;
    align-items: center;
    background: rgba(20,20,20,0.95);
    border-top: 1px solid #333;
    backdrop-filter: blur(6px);
  }

  .nav-item {
    width: 56px; height: 56px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    font-size: 28px;
    user-select: none;
  }
  .nav-item.active {
    outline: 2px solid rgba(255,255,255,0.15);
    outline-offset: 2px;
  }
</style>
</head>
<body>

<!-- Logo -->
<div class="logo">
  <img src="static/Figures/logo.jpeg" alt="BeyondSunday Logo" />
</div>

<!-- Upload screen -->
<div class="upload-container" id="uploadContainer">
  <input type="file" id="photoInput" accept="image/*" capture="environment" />
  <button id="uploadBtn">Take a Photo or Upload</button>
</div>

<!-- Story screen -->
<div class="story-container" id="storyContainer">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <img id="storyImage" class="story-image" alt="Story" />

  <!-- Dropdown always there -->
  <div id="scriptureDropdownContainer">
    <label for="scriptureSelect" style="color:white;">Choose:</label>
    <select id="scriptureSelect">
      <option>Loading scriptures...</option>
    </select>
  </div>

  <!-- Scripture overlay -->
  <div class="scripture-text" id="scriptureText"></div>

  <!-- Emotions -->
  <div class="emotion-row" id="emotionRow"></div>
</div>

<!-- Bottom nav -->
<nav class="bottom-nav">
  <div class="nav-item" id="homeTab">🏠</div>
  <div class="nav-item active" id="storyTabBtn">➕</div>
  <div class="nav-item" id="discoverTab">🌍</div>
  <div class="nav-item" id="profileTab">👤</div>
</nav>

<script>
  const uploadContainer = document.getElementById('uploadContainer');
  const storyContainer = document.getElementById('storyContainer');
  const photoInput = document.getElementById('photoInput');
  const uploadBtn = document.getElementById('uploadBtn');
  const storyImage = document.getElementById('storyImage');
  const progressFill = document.getElementById('progressFill');
  const emotionRow = document.getElementById('emotionRow');
  const scriptureText = document.getElementById('scriptureText');
  const scriptureSelect = document.getElementById('scriptureSelect');

  const emotions = ["🙏 Grateful","😊 Joyful","😌 Peaceful","✨ Hopeful","❤️ Loved","🔥 Passionate","🌿 Forgiving","💪 Empowered","🤯 Overwhelmed","😔 Reflective","💭 Seeking","😢 Mourning"];

  uploadBtn.addEventListener('click', () => photoInput.click());

  photoInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file || !file.type.startsWith('image/')) {
        photoInput.value = '';
        return;
    }

    const formData = new FormData();
    formData.append('photo', file);

    try {
      const response = await fetch('/upload_photo', { method: 'POST', body: formData });
      if (!response.ok) throw new Error('Upload failed.');
      const data = await response.json();

      storyImage.src = `/uploads/${data.filename}`;
      uploadContainer.style.display = 'none';
      storyContainer.style.display = 'flex';

      // Populate scriptures
      scriptureSelect.innerHTML = '';
      if (Array.isArray(data.scriptures) && data.scriptures.length > 0) {
        data.scriptures.forEach((verse, idx) => {
          const opt = document.createElement('option');
          opt.value = verse;
          opt.textContent = verse;
          scriptureSelect.appendChild(opt);
        });
        scriptureText.textContent = data.scriptures[0];
        setTimeout(() => scriptureText.classList.add('show'), 500);

        scriptureSelect.addEventListener('change', e => {
          scriptureText.textContent = e.target.value;
        });
      } else {
        scriptureSelect.innerHTML = '<option>No scriptures available</option>';
      }

      showStory(data.story_duration_ms);

    } catch (err) {
      console.error(err);
      alert("Upload failed.");
    } finally {
      photoInput.value = '';
    }
  });

  function showStory(duration) {
    emotionRow.innerHTML = '';
    emotions.forEach(emotion => {
      const chip = document.createElement('div');
      chip.className = 'emotion-chip';
      chip.textContent = emotion;
      chip.addEventListener('click', () => {
        document.querySelectorAll('.emotion-chip').forEach(c => c.classList.remove('selected'));
        chip.classList.add('selected');
      });
      emotionRow.appendChild(chip);
    });

    progressFill.style.transition = 'none';
    progressFill.style.width = '0%';
    setTimeout(() => {
      progressFill.style.transition = `width ${duration}ms linear`;
      progressFill.style.width = '100%';
    });

    setTimeout(() => {
      storyContainer.style.display = 'none';
      uploadContainer.style.display = 'flex';
      scriptureText.classList.remove('show');
    }, duration);
  }
</script>
</body>
</html>
